name: Deploy to Cloudflare Pages

on:
push:
branches:
- main # Make sure this matches your default branch name

jobs:
deploy:
runs-on: ubuntu-latest
permissions:
contents: read
deployments: write
name: Build and Deploy
steps:
- name: Checkout
uses: actions/checkout@v4

# If you are just using plain HTML/JS files, leave the next section commented out.
# If you're using React/Vite/Next.js, uncomment the lines below:
# - name: Install & Build
# run: npm install && npm run build

- name: Publish to Cloudflare Pages
uses: cloudflare/pages-action@v1
with:
apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
projectName: kereru-website # <--- CHANGE THIS to your Project Name in Cloudflare
directory: ./ # <--- If you build your site, change this to 'dist' or 'build'
gitHubToken: ${{ secrets.GITHUB_TOKEN }}

